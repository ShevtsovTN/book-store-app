server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php;

    # ── Charset & logs ───────────────────────────────────────
    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── API → Laravel (PHP-FPM) ───────────────────────────────
    location ~ ^/api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/webhooks {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;                          # сервис app, порт PHP-FPM
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ── Frontend → Vite dev server ────────────────────────────
    location / {
        proxy_pass http://frontend:5173;                # сервис frontend, порт Vite

        # Обязательно для Vite HMR (Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Vite internal (HMR websocket) ─────────────────────────
    location /@vite/ {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static files Laravel (storage) ───────────────────────
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Запрет доступа к скрытым файлам ──────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
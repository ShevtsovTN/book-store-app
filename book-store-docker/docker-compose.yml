services:

  # ── Application ──────────────────────────────────────────
  app:
    build: ./php-fpm
    volumes:
      - ../book-store-backend:/var/www/html
      - ./php-fpm/php-fpm.conf:/usr/local/etc/php-fpm.conf
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - meilisearch
      - minio
    networks:
      - backend
      - storage
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ../book-store-backend:/var/www/html:ro
      - ./nginx/www.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend

  frontend:
    build:
      context: ../book-store-frontend
      dockerfile: ../book-store-docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ../book-store-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - nginx
    networks:
      - backend

  # ── Storage ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - storage

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - storage

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672
    networks:
      - storage

  meilisearch:
    image: getmeili/meilisearch:latest
    env_file:
      - .env
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"     # Web UI → http://localhost:9001
    networks:
      - storage

  # ── Dev Tools ─────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI → http://localhost:8025
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  meilisearch_data:
  minio_data:

networks:
  backend:
    driver: bridge   # nginx ↔ app ↔ frontend ↔ mailpit ↔ stripe-cli
  storage:
    driver: bridge   # app ↔ postgres, redis, rabbitmq, meilisearch, minio
; book-store-docker/php/php.ini

; ── Основное ──────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 60
upload_max_filesize = 50M    ; загрузка обложек и PDF книг
post_max_size = 50M

; ── OPcache ───────────────────────────────────────────────
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1     ; 0 в production
opcache.revalidate_freq = 0

; ── Логирование ───────────────────────────────────────────
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL
display_errors = Off